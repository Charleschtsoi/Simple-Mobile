name: SimpleMobile
options:
  bundleIdPrefix: com.charlescht
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: BKJ456P59V
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SimpleMobile:
    type: application
    platform: iOS
    sources:
      - path: SimpleMobile
        excludes:
          - Resources/Localizable.xcstrings
    resources:
      - path: SimpleMobile/Resources/Localizable.xcstrings
      - path: SimpleMobile/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlescht.simplemobile
        INFOPLIST_KEY_CFBundleDisplayName: "極簡手機"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "Save solid-color wallpapers to your Photos library for a minimalist home screen."
        INFOPLIST_KEY_LSApplicationQueriesSchemes:
          - whatsapp
          - barcelona
          - sgnl
          - spotify
          - payme
          - alipayhk
          - openrice
          - foodpanda
          - deliveroo
          - hktvmall
          - citymapper
          - shortcuts
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: SimpleMobile/SimpleMobile.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.charlescht.simplemobile.shared
    dependencies:
      - target: SimpleWidget
        embed: true

  SimpleWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SimpleWidget
        excludes:
          - Info.plist
      - path: SimpleMobile/Models
      - path: SimpleMobile/Utilities
        excludes:
          - HapticManager.swift
    info:
      path: SimpleWidget/Info.plist
      properties:
        CFBundleDisplayName: SimpleWidget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charlescht.simplemobile.SimpleWidget
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
    entitlements:
      path: SimpleWidget/SimpleWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.charlescht.simplemobile.shared

schemes:
  SimpleMobile:
    build:
      targets:
        SimpleMobile: all
        SimpleWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
